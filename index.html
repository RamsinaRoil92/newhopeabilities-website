<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#1b365d" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="NewHope Abilities provides warm, person-centred NDIS support across Melbourne, including community access, self-care, cleaning, and household tasks."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>NewHope Abilities | NDIS Support in Melbourne</title>
    <script>
      try {
        if (localStorage.getItem('nha-high-contrast') === 'true') {
          document.documentElement.classList.add('high-contrast')
        }
        var textSize = localStorage.getItem('nha-text-size')
        if (textSize === 'large') document.documentElement.classList.add('text-size-large')
        if (textSize === 'larger') document.documentElement.classList.add('text-size-larger')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
